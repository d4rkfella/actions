name: 'Build and publish image with apko'
description: |
  Publish a built image from a YAML configuration file.

inputs:
  apko-image:
    description: |
      The full reference of the apko container image to invoke,
      including registry, repository, and tag or digest.
    default: 'cgr.dev/chainguard/apko:latest'

  config:
    description: The config file to use for building the image.
    default: .apko.yaml

  lockfile:
    required: false
    default: ''
    description: |
      A path to .lock.json file that constrains versions of packages.

  tag:
    description: The tag to use for publishing the image.
    required: true

  repository_owner:
    description: The repository owner's GitHub username.
    default: ${{ github.repository_owner }}

  repository:
    description: The repository name.
    default: ${{ github.repository }}

  token:
    description: The repository owner's GitHub token.
    default: ${{ github.token }}

  image_refs:
    description: Path to file where published image references will be written.
    default: /tmp/apko.images

  keyring-append:
    description: Local path or URL to extra keys to include in the keyring.
    required: false
    default: ''

  build-repository-append:
    description: Local path or URL of extra repositories for the build environment.
    required: false
    default: ''

  repository-append:
    description: Local path or URL of extra repositories for the generated image.
    required: false
    default: ''

  package-append:
    description: Extra packages to include.
    required: false
    default: ''

  archs:
    description: Architectures to build for (e.g., x86_64,ppc64le,arm64).
    required: false
    default: ''

  build-options:
    description: Build options to enable (comma-separated).
    default: ''

  build-date:
    description: Date used for the timestamps of the files inside the image.
    required: false
    default: ''

  vcs-url:
    description: Detect and embed VCS URLs.
    type: boolean
    required: false
    default: true

  debug:
    description: Enable debug logging.
    type: boolean
    required: false
    default: false

  automount-src:
    description: If this directory is found, create a copy at automount-dest.
    default: ${{ github.workspace }}/.apko-automount

  automount-dest:
    description: If automount-src is found, create a copy at this location.
    default: /work

  generic-user:
    description: Username to login to registry.
    required: false
    default: ''

  generic-pass:
    description: Password to login to registry.
    required: false
    default: ''

  annotations:
    description: OCI annotations to add. Separate with colon (key:value).
    required: false
    default: ''

  sbom-path:
    description: Path to write the SBOMs.
    required: false
    default: ''

outputs:
  digest:
    value: ${{ steps.get-digest.outputs.digest }}
    description: The digest of the published container image.

runs:
  using: composite
  steps:
    - name: Registry login
      if: inputs.generic-user != '' && inputs.generic-pass != ''
      shell: bash
      env:
        GENERIC_PASS: ${{ inputs.generic-pass }}
        GENERIC_USER: ${{ inputs.generic-user }}
        TAG: ${{ inputs.tag }}
      run: |
        REGISTRY=$(echo "$TAG" | cut -d'/' -f1)
        echo "$GENERIC_PASS" | docker login "$REGISTRY" -u "$GENERIC_USER" --password-stdin

    - name: Automount
      if: inputs.automount-src != ''
      shell: bash
      env:
        AUTOMOUNT_SRC: ${{ inputs.automount-src }}
        AUTOMOUNT_DEST: ${{ inputs.automount-dest }}
      run: |
        if [ -d "$AUTOMOUNT_SRC" ]; then
          echo "Creating copy of $AUTOMOUNT_SRC at $AUTOMOUNT_DEST"
          cp -r "$AUTOMOUNT_SRC" "$AUTOMOUNT_DEST"
        fi

    - name: Build apko arguments
      id: build-args
      shell: bash
      env:
        BUILD_DATE: ${{ inputs.build-date }}
        KEYRING: ${{ inputs.keyring-append }}
        BUILD_REPO: ${{ inputs.build-repository-append }}
        REPO: ${{ inputs.repository-append }}
        PACKAGES: ${{ inputs.package-append }}
        ARCHS: ${{ inputs.archs }}
        ANNOTATIONS: ${{ inputs.annotations }}
        SBOM_PATH: ${{ inputs.sbom-path }}
        BUILD_OPTIONS: ${{ inputs.build-options }}
        LOCKFILE: ${{ inputs.lockfile }}
        VCS_URL: ${{ inputs.vcs-url }}
        DEBUG: ${{ inputs.debug }}
        IMAGE_REFS: ${{ inputs.image_refs }}
        CONFIG: ${{ inputs.config }}
        TAG: ${{ inputs.tag }}
      run: |
        args="publish"
        args="${args} --vcs=${VCS_URL}"
        args="${args} --image-refs=${IMAGE_REFS}"
        args="${args} --lockfile=${LOCKFILE}"
        [ "$DEBUG"       == "true" ] && args="${args} --log-level debug"
        [ -n "$BUILD_DATE"         ] && args="${args} --build-date=${BUILD_DATE}"
        [ -n "$KEYRING"            ] && args="${args} -k ${KEYRING}"
        [ -n "$BUILD_REPO"         ] && args="${args} -b ${BUILD_REPO}"
        [ -n "$REPO"               ] && args="${args} -r ${REPO}"
        [ -n "$PACKAGES"           ] && args="${args} -p ${PACKAGES}"
        [ -n "$ARCHS"              ] && args="${args} --arch ${ARCHS}"
        [ -n "$ANNOTATIONS"        ] && args="${args} --annotations ${ANNOTATIONS}"
        [ -n "$SBOM_PATH"          ] && args="${args} --sbom-path=${SBOM_PATH}"
        if [ -n "$BUILD_OPTIONS" ]; then
          for opt in $(echo "$BUILD_OPTIONS" | tr ',' ' '); do
            args="${args} --build-option ${opt}"
          done
        fi
        args="${args} ${CONFIG} ${TAG}"
        echo "args=${args}" >> "$GITHUB_OUTPUT"

    - name: Run apko publish
      uses: docker://cgr.dev/chainguard/apko:latest
      env:
        SOURCE_DATE_EPOCH: ${{ inputs.build-date }}
        GITHUB_ACTOR: ${{ inputs.repository_owner }}
        GITHUB_TOKEN: ${{ inputs.token }}
        REPOSITORY: ${{ inputs.repository }}
      with:
        args: ${{ steps.build-args.outputs.args }}

    - name: Get digest
      id: get-digest
      shell: bash
      env:
        IMAGE_REFS: ${{ inputs.image_refs }}
      run: |
        echo "digest=$(cat "$IMAGE_REFS")" >> "$GITHUB_OUTPUT"
